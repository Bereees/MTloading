<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anteprima SVG Elementor originale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #0a0a0f; color: #fff; font-family: Roboto, sans-serif; }
    .header-preview {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      animation: entraInsieme 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    @keyframes entraInsieme {
      0% { opacity: 0; transform: translateX(-40px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .e-svg-base { width: 160px; color: #fff; }
    .site-title { font-size: 22px; font-weight: 500; line-height: 1.2; }
    nav { justify-self: end; display: flex; gap: 1.5rem; font-size: 14px; }
  </style>
</head>
<body>
  <header class="header-preview">
    <!-- Stesso markup del widget Elementor, senza modificare l'SVG -->
    <div class="e-svg-base" data-mt-logo-animation>
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width: 100%; height: 100%; overflow: unset;" id="Livello_2" viewBox="0 0 157.56 137.11">
        <defs>
          <style>.cls-1 { fill: #fff; fill-rule: evenodd; stroke-width: 0px; }</style>
        </defs>
        <g id="Livello_1-2">
          <path class="cls-1" d="M4.03,7.48l.44,11.9v8.88H0V1.54h5.83l7.53,20.6L20.87,1.54h5.85v26.71h-4.49v-8.88l.44-11.91-7.74,20.79h-3.18L4.03,7.48ZM144.61,78.89h-8.31v-3.67h21.26v3.67h-8.39v23.05h-4.57v-23.05Z"></path>
          <path class="cls-1" d="M78.36,127.37h3.53V36.08h-3.53v91.29ZM80.13,137.11c-.22,0-.44-.04-.66-.13L12.69,110.27c-.7-.28-1.12-.96-1.11-1.67V34.54h3.53v72.89l65.02,26.01,66.13-26.45c.22-.09.44-.13.66-.13.7,0,1.36.42,1.64,1.11.36.91-.08,1.93-.98,2.3l-66.79,26.71c-.22.09-.44.13-.66.13ZM80.13,30.25c-.22,0-.44-.04-.66-.13L33.74,11.75c-.91-.36-1.35-1.39-.98-2.3.36-.91,1.39-1.35,2.3-.98l45.08,18.11L146.26.13c.91-.36,1.94.08,2.3.98.09.23.13.46.13.69v67.62h-3.53V4.38l-64.36,25.75c-.22.09-.44.13-.66.13Z"></path>
        </g>
      </svg>
    </div>
    <h1 class="site-title">MEMORIE<br>TANGIBILI</h1>
    <nav><span>DIARI INEDITI</span><span>SCACCHI</span><span>ARTICOLI</span></nav>
  </header>
  <script src="logo-animation.js"></script>
</body>
</html>
